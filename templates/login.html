<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Bharat Stocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="logo">₹</span>
      <div>
        <h1>Bharat&nbsp;Stocks</h1>
        <p class="tag">Indian Market Analysis &amp; Signals · NSE / BSE</p>
      </div>
    </div>

    <div class="auth-tabs">
      <button type="button" class="auth-tab {{ 'active' if mode != 'register' else '' }}" data-mode="login">Sign in</button>
      <button type="button" class="auth-tab {{ 'active' if mode == 'register' else '' }}" data-mode="register">Create account</button>
    </div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}" class="auth-form" id="authForm">
      <input type="hidden" name="mode" id="modeField" value="{{ 'register' if mode == 'register' else 'login' }}" />
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <label class="auth-label">Username</label>
      <input class="auth-input" type="text" name="username" autocomplete="username" placeholder="your username" required autofocus />

      <label class="auth-label">Password</label>
      <input class="auth-input" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required />

      <div id="confirmWrap" class="{{ '' if mode == 'register' else 'hidden' }}">
        <label class="auth-label">Confirm password</label>
        <input class="auth-input" type="password" name="confirm" autocomplete="new-password" placeholder="••••••••" />
      </div>

      <button type="submit" class="primary auth-submit" id="submitBtn">
        {{ 'Create account' if mode == 'register' else 'Sign in' }}
      </button>
    </form>

    <p class="auth-hint">Default login — <strong>admin</strong> / <strong>admin123</strong> (change after first sign in).</p>
  </div>

  <script>
    const tabs = document.querySelectorAll(".auth-tab");
    const modeField = document.getElementById("modeField");
    const confirmWrap = document.getElementById("confirmWrap");
    const confirmInput = confirmWrap.querySelector("input");
    const submitBtn = document.getElementById("submitBtn");

    tabs.forEach((t) => {
      t.addEventListener("click", () => {
        tabs.forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        const mode = t.dataset.mode;
        modeField.value = mode;
        const register = mode === "register";
        confirmWrap.classList.toggle("hidden", !register);
        confirmInput.required = register;
        submitBtn.textContent = register ? "Create account" : "Sign in";
      });
    });
  </script>
</body>
</html>
